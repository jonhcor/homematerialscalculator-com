<div style="max-width:900px;margin:2rem auto;padding:0 1rem;font-family:sans-serif;color:#1A2B3C">
  <h1 style="font-size:2rem;margin-bottom:.5rem">DecodeMyChart — Medical Abbreviation Reference</h1>
  <p style="color:#64748B;margin-bottom:2rem;font-size:1.1rem">Plain-English definitions for medical abbreviations, acronyms, and lab values. Free reference for patients, caregivers, and students.</p>

  <h2 style="font-size:1.4rem;margin:2rem 0 1rem;border-bottom:2px solid #00A67E;padding-bottom:.5rem">General Medical Terms</h2>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">SOB — Shortness of Breath</h3><p>Difficulty breathing or feeling breathless. A very common symptom documented in charts to describe respiratory complaints. Patients presenting with SOB may have conditions ranging from anxiety and asthma to heart failure and pulmonary embolism.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">CC — Chief Complaint</h3><p>The primary reason the patient is seeking medical care, usually recorded in the patient's own words. The chief complaint is the starting point of every clinical encounter and guides the entire diagnostic workup.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">Dx — Diagnosis</h3><p>The medical identification of a disease or condition based on symptoms, exam findings, and test results. A diagnosis is the conclusion reached after evaluating all available clinical information.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">Tx — Treatment</h3><p>The medical management plan for a patient's condition, which may include medications, procedures, lifestyle changes, or referrals to specialists.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">Hx — History</h3><p>The patient's medical background including past illnesses, surgeries, hospitalizations, and family history relevant to current care.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">NPO — Nothing by Mouth</h3><p>From the Latin nil per os, meaning the patient must not eat, drink, or take anything by mouth. Typically required before surgery, certain procedures, or when the bowel needs to rest.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">DNR — Do Not Resuscitate</h3><p>A medical order indicating that if the patient's heart stops or they stop breathing, no CPR or resuscitation efforts should be performed. This is a legally binding order based on the patient's wishes.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">WNL — Within Normal Limits</h3><p>A shorthand indicating that a test result, exam finding, or measurement falls within the expected normal range. Commonly used in physical exam documentation.</p></div>

  <h2 style="font-size:1.4rem;margin:2rem 0 1rem;border-bottom:2px solid #00A67E;padding-bottom:.5rem">Lab Values and Normal Ranges</h2>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">CBC — Complete Blood Count</h3><p>A blood test measuring red blood cells, white blood cells, hemoglobin, hematocrit, and platelets. One of the most commonly ordered lab tests used to screen for anemia, infection, and blood disorders.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">WBC — White Blood Cell Count (Normal: 4.5–11.0 K/uL)</h3><p>Measures infection-fighting cells in the blood. A high WBC (leukocytosis) often signals infection or inflammation. A low WBC (leukopenia) may indicate viral illness, bone marrow problems, or immune suppression.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">Hgb — Hemoglobin (Normal: 11.5–17.5 g/dL)</h3><p>The protein in red blood cells that carries oxygen throughout the body. Low hemoglobin indicates anemia, which causes fatigue, pallor, and shortness of breath. Common causes include iron deficiency, vitamin B12 deficiency, and chronic disease.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">HbA1c — Hemoglobin A1c (Normal: 4.0–5.7%)</h3><p>A blood test reflecting average blood sugar levels over the past 2 to 3 months. Used to diagnose and monitor diabetes. A result of 5.7 to 6.4 percent indicates prediabetes; 6.5 percent or above indicates diabetes.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">TSH — Thyroid-Stimulating Hormone (Normal: 0.4–4.0 mIU/L)</h3><p>A pituitary hormone that regulates thyroid function. A high TSH suggests an underactive thyroid (hypothyroidism) causing fatigue and weight gain. A low TSH suggests an overactive thyroid (hyperthyroidism) causing weight loss and rapid heartbeat.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">Cr — Creatinine (Normal: 0.6–1.2 mg/dL)</h3><p>A waste product from muscle metabolism filtered by the kidneys. Elevated creatinine is a key indicator of reduced kidney function. Rising creatinine over several days is more concerning than a single elevated value.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">INR — International Normalized Ratio (Normal: 0.8–1.1)</h3><p>A standardized measure of how long blood takes to clot. Used primarily to monitor warfarin (blood thinner) therapy. Therapeutic range for warfarin patients is usually 2.0 to 3.0. Values above 3.5 significantly increase bleeding risk.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">LDL — Low-Density Lipoprotein (Normal: under 100 mg/dL)</h3><p>Known as bad cholesterol. High LDL increases the risk of plaque buildup in arteries, leading to heart attack and stroke. Lifestyle changes and statin medications are the primary treatments for elevated LDL.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">eGFR — Estimated Glomerular Filtration Rate (Normal: 60–120 mL/min)</h3><p>An estimate of how well the kidneys are filtering blood. A result below 60 mL/min indicates chronic kidney disease. The lower the number, the less kidney function remains. Below 15 typically requires dialysis or a kidney transplant.</p></div>

  <h2 style="font-size:1.4rem;margin:2rem 0 1rem;border-bottom:2px solid #00A67E;padding-bottom:.5rem">Pharmacy and Dosing Terms</h2>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">PRN — As Needed</h3><p>From the Latin pro re nata, meaning as the thing is needed. Medication is taken only when symptoms occur rather than on a fixed daily schedule. For example, a pain medication prescribed PRN is taken only when pain is present.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">BID — Twice Daily</h3><p>Medication taken two times per day, typically morning and evening, roughly 12 hours apart. Common examples include many antibiotics and blood pressure medications.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">QD — Once Daily</h3><p>Medication administered once every 24 hours. Many chronic disease medications such as statins, blood pressure pills, and thyroid medications are prescribed once daily.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">IV — Intravenous</h3><p>Medication or fluids delivered directly into a vein through a needle or catheter, allowing for the most rapid absorption into the bloodstream. Used in hospitals for antibiotics, fluids, pain medications, and many other treatments.</p></div>

  <h2 style="font-size:1.4rem;margin:2rem 0 1rem;border-bottom:2px solid #00A67E;padding-bottom:.5rem">Cardiology Terms</h2>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">MI — Myocardial Infarction</h3><p>A heart attack, occurring when blood flow to part of the heart muscle is blocked long enough to cause permanent damage. Symptoms include chest pain, shortness of breath, and pain radiating to the arm or jaw. A medical emergency requiring immediate treatment.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">HTN — Hypertension</h3><p>High blood pressure, defined as consistently elevated blood pressure readings above 130 over 80 mmHg. A major risk factor for heart attack, stroke, and kidney disease. Often called the silent killer because it has no symptoms.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">A-Fib — Atrial Fibrillation</h3><p>An irregular, often rapid heart rhythm originating in the upper chambers of the heart. Significantly increases the risk of stroke. Treated with rate control medications, blood thinners, and sometimes cardioversion or ablation.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">CHF — Congestive Heart Failure</h3><p>A condition where the heart cannot pump blood efficiently, causing fluid to back up into the lungs and body tissues. Causes shortness of breath, leg swelling, and fatigue. Managed with diuretics, ACE inhibitors, and beta-blockers.</p></div>

  <h2 style="font-size:1.4rem;margin:2rem 0 1rem;border-bottom:2px solid #00A67E;padding-bottom:.5rem">Insurance and Billing Terms</h2>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">EOB — Explanation of Benefits</h3><p>A document sent by your insurance company after a medical claim is processed. It shows what was billed, what your insurance paid, and what you may owe. An EOB is not a bill — it is an informational statement showing how your claim was processed.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">OOP — Out of Pocket</h3><p>The amount you pay directly for healthcare costs not covered by insurance, including deductibles, copays, and coinsurance. Once you reach your annual out-of-pocket maximum, your insurance covers 100 percent of remaining covered costs.</p></div>
  <div style="margin-bottom:1.5rem"><h3 style="color:#0A2540">PA — Prior Authorization</h3><p>Approval required from your insurance company before certain medications, procedures, or specialist visits are covered. Your doctor submits clinical documentation to justify medical necessity. Denial of a prior authorization can be appealed.</p></div>

  <p style="margin-top:3rem;padding:1rem;background:#f8f8f8;border-radius:8px;font-size:13px;color:#64748B">
    <strong>Educational reference only.</strong> This site is for informational purposes and does not constitute medical advice. Always consult a qualified healthcare provider regarding your specific medical situation. Normal lab ranges can vary between laboratories and patient populations.
  </p>

{term:'DDx',full:'Differential Diagnosis',cat:'general',def:'A list of possible diagnoses ranked by likelihood that the clinician considers before reaching a final diagnosis.',usage:'DDx includes MI, PE, and aortic dissection.',related:["Dx","Tx","W/U"]},
{term:'Tx',full:'Treatment',cat:'general',def:'The medical management plan for a patient\'s condition, which may include medications, procedures, or lifestyle changes.',usage:'Tx: IV fluids, antibiotics, and supportive care.',related:["Dx","Rx","PRN"]},
{term:'Rx',full:'Prescription or Treatment',cat:'general',def:'In pharmacy, Rx refers to a prescription. In general charts, it may also mean treatment or therapy.',usage:'Rx: Amoxicillin 500mg PO TID x 10 days.',related:["Tx","OTC","DAW","PRN"]},
{term:'Sx',full:'Symptoms',cat:'general',def:'Subjective experiences reported by the patient such as pain, fatigue, or dizziness as opposed to signs a clinician observes.',usage:'Sx include fever, fatigue, and mild cough for 5 days.',related:["Hx","CC","ROS","Dx"]},
{term:'CC',full:'Chief Complaint',cat:'general',def:'The primary reason the patient is seeking medical care, usually recorded in the patient\'s own words.',usage:'CC: I have had a bad headache for two days and my vision is blurry.',related:["HPI","Hx","ROS"]},
{term:'HPI',full:'History of Present Illness',cat:'general',def:'A detailed description of the current medical problem including when it started, what makes it better or worse, and how it has progressed.',usage:'HPI: 54yo male with 3-day Hx of worsening SOB, productive cough, and fever.',related:["CC","PMH","ROS"]},
{term:'PMH',full:'Past Medical History',cat:'general',def:'A record of the patient\'s prior medical conditions, diagnoses, hospitalizations, and surgeries.',usage:'PMH: HTN, Type 2 DM, GERD, appendectomy 2010.',related:["FH","SH","Hx"]},
{term:'FH',full:'Family History',cat:'general',def:'Medical conditions in the patient\'s biological relatives that may be relevant to their own health risk.',usage:'FH: Father died of MI at 58. Mother has HTN and DM.',related:["PMH","SH","Hx"]},
{term:'SH',full:'Social History',cat:'general',def:'Information about a patient\'s lifestyle including occupation, tobacco and alcohol use, housing, and relationships.',usage:'SH: Former smoker 20 pack-years, quit 2015. Occasional ETOH.',related:["PMH","FH","Hx"]},
{term:'ROS',full:'Review of Systems',cat:'general',def:'A systematic checklist of symptoms going through each body system to identify conditions the patient may not have mentioned.',usage:'ROS: Positive for SOB and fatigue. Negative for fever, N/V, chest pain.',related:["HPI","CC","VS"]},
{term:'VS',full:'Vital Signs',cat:'general',def:'Basic measurements of essential body functions: temperature, heart rate, blood pressure, respiratory rate, and oxygen saturation.',usage:'VS: T 38.2C, HR 98, BP 128/82, RR 18, SpO2 96% on RA.',related:["BP","HR","SpO2"]},
{term:'WNL',full:'Within Normal Limits',cat:'general',def:'A shorthand indicating that a test result, exam finding, or measurement falls within the expected normal range.',usage:'Heart and lung sounds WNL. Abdomen WNL.',related:["NAD","VS"]},
{term:'NAD',full:'No Acute Distress',cat:'general',def:'A common exam finding indicating the patient does not appear to be in immediate pain or distress at the time of examination.',usage:'General: Patient is alert, oriented, in NAD.',related:["A&O","WNL"]},
{term:'A&O',full:'Alert and Oriented',cat:'general',def:'Describes a patient\'s level of consciousness. Usually noted as A&Ox3 (person, place, time) or A&Ox4 (adding situation).',usage:'Neuro: A&Ox4, speech clear, no focal deficits.',related:["LOC","GCS","NAD"]},
{term:'STAT',full:'Immediately',cat:'general',def:'From the Latin statim meaning at once. Used to mark orders, labs, or medications that must be done right away.',usage:'Order CBC STAT. Give 325mg aspirin STAT.',related:["PRN","QD"]},
{term:'DNR',full:'Do Not Resuscitate',cat:'general',def:'A medical order indicating that if the patient\'s heart stops or they stop breathing, no CPR or resuscitation should be performed.',usage:'Patient has valid DNR on file. DNR/DNI orders confirmed.',related:["DNI","CPR","AMA"]},
{term:'DNI',full:'Do Not Intubate',cat:'general',def:'A medical order specifying that the patient should not be placed on a mechanical ventilator, even in an emergency.',usage:'Goals of care discussed. Patient is DNR/DNI.',related:["DNR","BiPAP","CPR"]},
{term:'AMA',full:'Against Medical Advice',cat:'general',def:'When a patient chooses to leave the hospital or refuse treatment despite being told by their physician that it could be harmful.',usage:'Patient left AMA after refusing IV antibiotics. Form signed.',related:["Hx"]},
{term:'NPO',full:'Nothing by Mouth',cat:'general',def:'Latin nil per os. Patient must not eat, drink, or take anything by mouth. Typically required before surgery or procedures.',usage:'Patient NPO after midnight for OR in the morning.',related:["PO","IV"]},
{term:'D/C',full:'Discharge or Discontinue',cat:'general',def:'Either discharging a patient from the hospital, or stopping a medication or treatment. Context determines meaning.',usage:'DC home with oral antibiotics. DC IV heparin infusion.',related:["Tx","Rx"]},
{term:'Abd',full:'Abdomen',cat:'general',def:'Refers to the abdominal region of the body. Frequently documented in physical exam notes.',usage:'Abd: soft, non-tender, non-distended, bowel sounds present.',related:["N/V","GI"]},
{term:'DOE',full:'Dyspnea on Exertion',cat:'general',def:'Shortness of breath that occurs during physical activity rather than at rest.',usage:'Patient reports DOE with climbing one flight of stairs.',related:["SOB","CHF","COPD"]},
{term:'W/U',full:'Workup',cat:'general',def:'The diagnostic evaluation process including tests, imaging, and consultations ordered to identify or rule out a condition.',usage:'Admit for further W/U of new onset A-Fib.',related:["Dx","DDx"]},
{term:'c/o',full:'Complains Of',cat:'general',def:'Shorthand indicating what the patient is reporting as their main symptom or concern.',usage:'Patient c/o worsening knee pain x 2 weeks.',related:["CC","Sx","HPI"]},
{term:'s/p',full:'Status Post',cat:'general',def:'Used to indicate a patient has previously undergone a procedure or experienced a medical event.',usage:'s/p appendectomy 2019. s/p MI 2021.',related:["PMH","Hx","Dx"]},
{term:'q',full:'Every',cat:'general',def:'Latin quaque. Used in dosing instructions to mean every as in q4h means every 4 hours, q8h every 8 hours.',usage:'Acetaminophen 650mg PO q6h PRN pain.',related:["PRN","QD","BID","TID"]},
{term:'RA',full:'Room Air',cat:'general',def:'When documenting oxygen levels, RA means the patient is breathing regular room air without supplemental oxygen.',usage:'SpO2 96% on RA. No supplemental O2 needed.',related:["SpO2","BiPAP","CPAP"]},
{term:'PE',full:'Physical Exam',cat:'general',def:'The hands-on assessment a clinician performs during a visit, checking vital signs and examining each body system.',usage:'PE: NAD, lungs clear, abdomen soft, no edema.',related:["VS","ROS","WNL"]},
{term:'PRN',full:'Pro Re Nata - As Needed',cat:'pharmacy',def:'Latin for as the thing is needed. Medication taken only when symptoms occur, not on a fixed daily schedule.',usage:'Ibuprofen 400mg PO PRN pain, max q6h.',related:["QD","BID","TID","QID"]},
{term:'QD',full:'Once Daily',cat:'pharmacy',def:'Medication administered once every 24 hours.',usage:'Lisinopril 10mg PO QD every morning.',related:["BID","TID","QID","QHS"]},
{term:'BID',full:'Twice Daily',cat:'pharmacy',def:'Medication taken two times per day, typically morning and evening, roughly 12 hours apart.',usage:'Metformin 500mg PO BID with meals.',related:["QD","TID","QID","PRN"]},
{term:'TID',full:'Three Times Daily',cat:'pharmacy',def:'Medication administered three times per day.',usage:'Amoxicillin 500mg PO TID x 10 days.',related:["BID","QID","QD","PRN"]},
{term:'QID',full:'Four Times Daily',cat:'pharmacy',def:'Medication taken four times a day, usually every 6 hours.',usage:'Acetaminophen 325mg PO QID PRN pain.',related:["TID","BID","QD","PRN"]},
{term:'QHS',full:'Every Bedtime',cat:'pharmacy',def:'Medication taken once daily at bedtime.',usage:'Melatonin 3mg PO QHS PRN sleep.',related:["QD","PRN","PO"]},
{term:'AC',full:'Before Meals',cat:'pharmacy',def:'Medication taken before eating.',usage:'Metoclopramide 10mg PO AC and QHS.',related:["PC","PO","TID"]},
{term:'PC',full:'After Meals',cat:'pharmacy',def:'Medication taken after eating to reduce stomach irritation.',usage:'Iron supplements 325mg PO PC to reduce GI upset.',related:["AC","PO","TID"]},
{term:'PO',full:'Per Os - By Mouth',cat:'pharmacy',def:'Latin for by mouth. Medication taken orally as a pill, tablet, capsule, or liquid.',usage:'Switch from IV to PO antibiotics once tolerating oral intake.',related:["IV","IM","SQ","NPO"]},
{term:'IV',full:'Intravenous',cat:'pharmacy',def:'Medication or fluids delivered directly into a vein, allowing for rapid absorption.',usage:'NS 1L IV bolus over 1 hour for dehydration.',related:["IM","SQ","PO","PICC"]},
{term:'IM',full:'Intramuscular',cat:'pharmacy',def:'Injection delivered into the muscle tissue. Absorbed faster than SQ, slower than IV.',usage:'Flu vaccine 0.5mL IM left deltoid.',related:["IV","SQ","PO"]},
{term:'SQ',full:'Subcutaneous',cat:'pharmacy',def:'Injection into the fatty layer just below the skin. Used for insulin and many blood thinners.',usage:'Insulin glargine 20 units SQ QHS.',related:["IM","IV","PO"]},
{term:'OTC',full:'Over the Counter',cat:'pharmacy',def:'Medications available without a prescription, such as acetaminophen, ibuprofen, and antacids.',usage:'Trial OTC loratadine for seasonal allergies before starting Rx.',related:["Rx","PRN","PO"]},
{term:'DAW',full:'Dispense as Written',cat:'pharmacy',def:'Instruction telling the pharmacist to dispense the exact brand-name drug prescribed with no generic substitution.',usage:'DAW: Brand Synthroid required; no generic substitution.',related:["Rx","NR"]},
{term:'NR',full:'No Refills',cat:'pharmacy',def:'Notation on a prescription indicating it cannot be refilled without a new prescription.',usage:'Oxycodone 5mg #30, NR.',related:["Rx","DAW","PRN"]},
{term:'MDI',full:'Metered-Dose Inhaler',cat:'pharmacy',def:'A handheld device delivering a specific medication dose as a spray inhaled into the lungs.',usage:'Albuterol MDI 2 puffs PRN SOB/wheeze.',related:["COPD","SOB","PRN"]},
{term:'mg',full:'Milligram',cat:'pharmacy',def:'Unit of weight equal to 1/1000 of a gram. The most common unit for medication dosing.',usage:'Metoprolol 25mg PO BID.',related:["mcg","g","mEq","mL"]},
{term:'mcg',full:'Microgram',cat:'pharmacy',def:'Unit of weight equal to 1/1000000 of a gram. Used for very potent medications like levothyroxine and fentanyl.',usage:'Levothyroxine 50 mcg PO QD.',related:["mg","g","TSH"]},
{term:'mEq',full:'Milliequivalent',cat:'pharmacy',def:'A unit for electrolytes like potassium and sodium accounting for both amount and electrical charge.',usage:'Potassium chloride 40 mEq IV over 4 hours.',related:["mg","K","Na"]},
{term:'NSAID',full:'Non-Steroidal Anti-Inflammatory Drug',cat:'pharmacy',def:'A class of pain relievers that reduce inflammation. Examples include ibuprofen, naproxen, and aspirin.',usage:'Avoid NSAIDs given history of GI bleed. Use acetaminophen instead.',related:["PRN","PO","GERD","OTC"]},
{term:'PICC',full:'Peripherally Inserted Central Catheter',cat:'pharmacy',def:'A long thin tube inserted into a vein in the arm and advanced near the heart. Used for long-term IV medications.',usage:'PICC line placed for 6-week course of IV antibiotics.',related:["IV","SQ","IM"]},
{term:'MI',full:'Myocardial Infarction',cat:'cardiology',def:'A heart attack. Occurs when blood flow to part of the heart is blocked long enough to cause permanent damage to the heart muscle.',usage:'Patient transferred to cath lab for STEMI, confirmed MI.',related:["ACS","STEMI","NSTEMI","CAD","EKG"]},
{term:'ACS',full:'Acute Coronary Syndrome',cat:'cardiology',def:'An umbrella term for conditions where blood flow to the heart is suddenly reduced, including heart attacks and unstable angina.',usage:'ACS protocol activated. Serial EKGs and troponins ordered.',related:["MI","STEMI","NSTEMI","CAD"]},
{term:'STEMI',full:'ST-Elevation Myocardial Infarction',cat:'cardiology',def:'A severe heart attack showing ST elevation on EKG indicating a major artery is completely blocked. A medical emergency.',usage:'STEMI alert, cath lab activated. PCI completed.',related:["MI","NSTEMI","EKG","ACS"]},
{term:'NSTEMI',full:'Non-ST-Elevation Myocardial Infarction',cat:'cardiology',def:'A heart attack without ST elevation on EKG, typically involving partial artery blockage.',usage:'Troponin elevated. EKG without ST changes. NSTEMI diagnosis.',related:["STEMI","MI","ACS","EKG"]},
{term:'CHF',full:'Congestive Heart Failure',cat:'cardiology',def:'A condition where the heart cannot pump efficiently, causing fluid to back up into the lungs and body tissues.',usage:'Patient admitted with acute CHF exacerbation. CXR shows pulmonary edema.',related:["EF","BNP","SOB","DOE","HTN"]},
{term:'CAD',full:'Coronary Artery Disease',cat:'cardiology',def:'Narrowing or blockage of the heart\'s blood vessels due to plaque buildup, increasing risk of heart attack.',usage:'PMH significant for CAD, prior stent placement 2018.',related:["MI","ACS","HTN","HLD"]},
{term:'HTN',full:'Hypertension',cat:'cardiology',def:'High blood pressure. Consistently elevated readings above 130/80 mmHg. A major risk factor for heart attack, stroke, and kidney disease.',usage:'PMH: HTN, managed on lisinopril 10mg QD.',related:["BP","CAD","CVA","DM"]},
{term:'HLD',full:'Hyperlipidemia',cat:'cardiology',def:'Abnormally high levels of fats in the blood including LDL cholesterol and triglycerides. A major risk factor for CAD.',usage:'HLD managed with atorvastatin 40mg QD.',related:["LDL","HDL","TG","CAD"]},
{term:'A-Fib',full:'Atrial Fibrillation',cat:'cardiology',def:'An irregular, often rapid heart rhythm originating in the upper chambers. Increases stroke risk significantly.',usage:'New onset A-Fib with RVR. Rate controlled with metoprolol.',related:["EKG","HR","DVT","INR"]},
{term:'EKG',full:'Electrocardiogram',cat:'cardiology',def:'A test recording the electrical activity of the heart using skin electrodes. Detects arrhythmias and heart attacks.',usage:'12-lead EKG obtained. ST elevations in V1-V4.',related:["MI","A-Fib","HR","STEMI"]},
{term:'ECHO',full:'Echocardiogram',cat:'cardiology',def:'An ultrasound of the heart showing its structure and function. Used to assess pumping function, valve disease, and pericardial fluid.',usage:'TTE ECHO ordered to assess EF and valve function.',related:["EF","CHF","MI"]},
{term:'EF',full:'Ejection Fraction',cat:'cardiology',def:'The percentage of blood pumped out of the left ventricle with each beat. Normal is 55-70%. Below 40% indicates reduced function.',usage:'ECHO: EF estimated at 35%, consistent with HFrEF.',related:["ECHO","CHF","BNP"]},
{term:'BNP',full:'B-Type Natriuretic Peptide',cat:'cardiology',def:'A hormone released by the heart when under stress. Elevated BNP is a strong marker for heart failure.',usage:'BNP 850 pg/mL, elevated, consistent with CHF exacerbation.',related:["CHF","EF","SOB"]},
{term:'DVT',full:'Deep Vein Thrombosis',cat:'cardiology',def:'A blood clot in a deep vein, usually in the leg. Can travel to the lungs as a pulmonary embolism.',usage:'Bilateral leg swelling. US confirms left lower extremity DVT.',related:["PE","INR","A-Fib"]},
{term:'BP',full:'Blood Pressure',cat:'cardiology',def:'The pressure of blood against artery walls, recorded as systolic over diastolic in mmHg.',usage:'BP 154/96, above goal. Uptitrate amlodipine.',related:["HTN","HR","VS","MAP"]},
{term:'HR',full:'Heart Rate',cat:'cardiology',def:'The number of times the heart beats per minute. Normal resting rate is 60-100 bpm.',usage:'HR 112, tachycardic. EKG ordered.',related:["BP","VS","EKG","A-Fib"]},
{term:'PVD',full:'Peripheral Vascular Disease',cat:'cardiology',def:'Narrowing of blood vessels outside the heart and brain, usually in the legs. Causes pain with walking.',usage:'PVD confirmed on ABI testing. Vascular surgery referral placed.',related:["CAD","HTN","DM","HLD"]},
{term:'MAP',full:'Mean Arterial Pressure',cat:'cardiology',def:'The average blood pressure in the arteries during one cardiac cycle. A MAP above 65 mmHg is needed to maintain organ perfusion.',usage:'MAP 58, below goal. IV fluids and vasopressors initiated.',related:["BP","ICU","VS"]},
{term:'CBC',full:'Complete Blood Count',cat:'labs',def:'A blood test measuring red cells, white cells, hemoglobin, hematocrit, and platelets. One of the most commonly ordered lab tests.',usage:'CBC ordered. WBC 12.4, Hgb 11.2, Plt 210.',related:["WBC","Hgb","Hct","Plt"]},
{term:'BMP',full:'Basic Metabolic Panel',cat:'labs',def:'A blood test measuring 8 key values: sodium, potassium, chloride, bicarbonate, BUN, creatinine, glucose, and calcium.',usage:'BMP shows Na 138, K 3.8, Cr 1.1, BUN 18, glucose 110.',related:["CMP","BUN","Cr","Na","K"]},
{term:'CMP',full:'Comprehensive Metabolic Panel',cat:'labs',def:'The BMP plus liver function tests. Provides a broad picture of metabolic and organ health.',usage:'CMP ordered as part of annual wellness labs.',related:["BMP","LFT","BUN","Cr"]},
{term:'TSH',full:'Thyroid-Stimulating Hormone',cat:'labs',def:'A pituitary hormone regulating thyroid function. High TSH suggests hypothyroidism; low TSH suggests hyperthyroidism.',usage:'TSH 6.8 (high), consistent with hypothyroidism. Start levothyroxine.',related:["T4","mcg","QD"]},
{term:'HbA1c',full:'Hemoglobin A1c',cat:'labs',def:'A blood test reflecting average blood sugar levels over 2-3 months. Goal typically below 7% for most diabetics.',usage:'HbA1c 8.2%, above goal. Adjust metformin dosing.',related:["DM","BMP"]},
{term:'PSA',full:'Prostate-Specific Antigen',cat:'labs',def:'A protein produced by the prostate. Elevated levels may indicate prostate cancer, benign enlargement, or inflammation.',usage:'PSA 5.8, elevated. Urology referral placed.',related:["Bx"]},
{term:'WBC',full:'White Blood Cell Count',cat:'labs',def:'Measures infection-fighting cells in the blood. Elevated WBC may indicate infection; low WBC may suggest immune suppression.',usage:'WBC 14.2, elevated, concern for infection.',related:["CBC","Hgb","Plt"]},
{term:'Hgb',full:'Hemoglobin',cat:'labs',def:'The protein in red blood cells that carries oxygen. Low hemoglobin indicates anemia. Normal is roughly 12-17 g/dL.',usage:'Hgb 9.4, low, consistent with moderate anemia.',related:["CBC","Hct"]},
{term:'Hct',full:'Hematocrit',cat:'labs',def:'The percentage of blood volume made up of red blood cells. Low hematocrit indicates anemia.',usage:'Hct 28%, low. Transfusion threshold discussion with patient.',related:["Hgb","CBC"]},
{term:'Plt',full:'Platelets',cat:'labs',def:'Tiny blood cells that help form clots. Normal range is 150000-400000 per microliter. Low platelets increase bleeding risk.',usage:'Plt 88000, thrombocytopenic. Hold anticoagulation.',related:["CBC","INR"]},
{term:'INR',full:'International Normalized Ratio',cat:'labs',def:'A standardized measure of clotting time used to monitor warfarin therapy. Normal is around 1.0; therapeutic range usually 2.0-3.0.',usage:'INR 3.8, supratherapeutic. Hold warfarin x1 dose.',related:["PT","Plt","A-Fib","DVT"]},
{term:'BUN',full:'Blood Urea Nitrogen',cat:'labs',def:'A waste product filtered by the kidneys. Elevated BUN may indicate dehydration, kidney dysfunction, or high protein breakdown.',usage:'BUN 42, Cr 2.1, elevated. Concern for AKI.',related:["Cr","eGFR","BMP"]},
{term:'Cr',full:'Creatinine',cat:'labs',def:'A waste product from muscle metabolism filtered by the kidneys. Elevated creatinine is a key indicator of reduced kidney function.',usage:'Creatinine trending up from 0.9 to 1.4 to 2.1 over 3 days.',related:["BUN","eGFR","BMP"]},
{term:'eGFR',full:'Estimated Glomerular Filtration Rate',cat:'labs',def:'An estimate of how well the kidneys filter blood. Below 60 mL/min indicates chronic kidney disease.',usage:'eGFR 42, CKD Stage 3b. Nephrology follow-up recommended.',related:["Cr","BUN","CKD"]},
{term:'LDL',full:'Low-Density Lipoprotein',cat:'labs',def:'Bad cholesterol. High LDL increases risk of artery plaque. Target typically below 100 mg/dL for high-risk patients.',usage:'LDL 148, above goal. Initiate statin therapy.',related:["HDL","TG","CAD","HLD"]},
{term:'HDL',full:'High-Density Lipoprotein',cat:'labs',def:'Good cholesterol. Higher HDL levels are associated with reduced cardiovascular risk.',usage:'HDL 38, low. Lifestyle counseling provided.',related:["LDL","TG","HLD","CAD"]},
{term:'CRP',full:'C-Reactive Protein',cat:'labs',def:'A protein produced by the liver in response to inflammation or infection. Elevated CRP indicates active inflammation.',usage:'hs-CRP 8.4, markedly elevated. Blood cultures obtained.',related:["ESR","WBC"]},
{term:'PT',full:'Prothrombin Time',cat:'labs',def:'Measures how long blood takes to clot. Used to monitor warfarin therapy.',usage:'PT 32 seconds (INR 2.8), therapeutic on warfarin.',related:["INR","Plt"]},
{term:'TG',full:'Triglycerides',cat:'labs',def:'A type of fat in the blood. High triglycerides alongside low HDL and high LDL increase cardiovascular risk.',usage:'TG 320, significantly elevated. Dietary counseling and fish oil recommended.',related:["LDL","HDL","HLD","CAD"]},
{term:'ESR',full:'Erythrocyte Sedimentation Rate',cat:'labs',def:'A blood test measuring how quickly red blood cells settle. Elevated ESR indicates inflammation or infection.',usage:'ESR 88 mm/hr, elevated. Consistent with inflammatory process.',related:["CRP","WBC"]},
{term:'Na',full:'Sodium',cat:'labs',def:'The main electrolyte in blood and body fluids. Normal range is 135-145 mEq/L. Low sodium causes confusion and seizures.',usage:'Na 128, hyponatremia. Fluid restriction initiated.',related:["K","BMP","CMP"]},
{term:'K',full:'Potassium',cat:'labs',def:'An electrolyte critical for heart and muscle function. Normal range is 3.5-5.0 mEq/L. Abnormal levels can cause dangerous heart rhythms.',usage:'K 2.9, low. IV potassium replacement ordered.',related:["Na","BMP","EKG","mEq"]},
{term:'CPR',full:'Cardiopulmonary Resuscitation',cat:'emergency',def:'An emergency procedure combining chest compressions and rescue breaths to restore circulation after cardiac arrest.',usage:'Patient found unresponsive. CPR initiated by nursing staff.',related:["AED","DNR","ICU"]},
{term:'AED',full:'Automated External Defibrillator',cat:'emergency',def:'A portable device that analyzes heart rhythm and delivers an electric shock to restore a normal heartbeat.',usage:'AED applied. Shock advised. V-fib terminated after 1 shock.',related:["CPR"]},
{term:'ICU',full:'Intensive Care Unit',cat:'emergency',def:'A specialized hospital unit providing continuous monitoring and advanced life support for critically ill patients.',usage:'Patient transferred to ICU for management of septic shock.',related:["NICU","CPR"]},
{term:'ER',full:'Emergency Room',cat:'emergency',def:'The hospital department providing immediate treatment for urgent or life-threatening medical conditions. Also called ED.',usage:'Patient presenting to ER via EMS with altered mental status.',related:["EMS","ICU"]},
{term:'EMS',full:'Emergency Medical Services',cat:'emergency',def:'Pre-hospital emergency care including paramedics and EMTs who respond to 911 calls.',usage:'EMS reports patient found unconscious at home, GCS 6 on arrival.',related:["ER","CPR"]},
{term:'GSW',full:'Gunshot Wound',cat:'emergency',def:'A wound caused by a firearm projectile. Documented with location, entry and exit wound details, and trajectory.',usage:'Trauma activation: GSW to right chest. BP 74/48 on arrival.',related:["MVC","OR"]},
{term:'MVC',full:'Motor Vehicle Crash',cat:'emergency',def:'An injury from a car, truck, or motorcycle accident. Used to describe the mechanism of injury.',usage:'MVC at high speed. C-spine precautions maintained.',related:["GSW","OR","TBI"]},
{term:'LOC',full:'Loss of Consciousness',cat:'emergency',def:'A period of unresponsiveness. Can be caused by head injury, seizure, cardiac events, or metabolic disturbances.',usage:'Witnessed LOC x 2 minutes at gym. GCS now 15.',related:["GCS","TBI","A&O"]},
{term:'GCS',full:'Glasgow Coma Scale',cat:'emergency',def:'A scoring system from 3-15 assessing consciousness based on eye opening, verbal response, and motor response. Below 8 usually requires intubation.',usage:'GCS 7 on arrival (E2V2M3). Intubation performed.',related:["LOC","A&O","TBI","ICU"]},
{term:'TBI',full:'Traumatic Brain Injury',cat:'emergency',def:'Brain damage caused by an external force. Ranges from mild concussion to severe coma.',usage:'CT head: epidural hematoma. Neurosurgery activated.',related:["GCS","LOC","MVC"]},
{term:'Sepsis',full:'Sepsis',cat:'emergency',def:'A life-threatening organ dysfunction caused by a dysregulated immune response to infection. Requires immediate antibiotics and IV fluids.',usage:'Sepsis protocol initiated. Blood cultures x2, IV fluids, broad-spectrum antibiotics.',related:["ICU","WBC","CRP","MAP","BP"]},
{term:'PE',full:'Pulmonary Embolism',cat:'emergency',def:'A blood clot that travels to the lungs, blocking blood flow. Causes sudden SOB, chest pain, and low oxygen. A medical emergency.',usage:'CTA chest confirms bilateral PE. Heparin drip started.',related:["DVT","SOB","CP","INR"]},
{term:'TIA',full:'Transient Ischemic Attack',cat:'neurology',def:'A mini-stroke. Brief neurological symptoms from temporary reduced brain blood flow that resolve within 24 hours without permanent damage.',usage:'TIA 3 days ago: slurred speech x 15 min, resolved fully.',related:["CVA","MRI","A-Fib","HTN"]},
{term:'CVA',full:'Cerebrovascular Accident',cat:'neurology',def:'A stroke. Permanent brain damage from either a blocked artery (ischemic) or a ruptured blood vessel (hemorrhagic).',usage:'CVA confirmed on MRI. tPA administered within 3-hour window.',related:["TIA","MRI","HTN","A-Fib"]},
{term:'MS',full:'Multiple Sclerosis',cat:'neurology',def:'A chronic autoimmune disease where the immune system attacks the protective myelin sheath around nerve fibers.',usage:'MS diagnosed at age 32. Currently on interferon therapy.',related:["MRI"]},
{term:'PD',full:'Parkinson\'s Disease',cat:'neurology',def:'A progressive nervous system disorder affecting movement, causing tremors, stiffness, and slowed movement.',usage:'PD diagnosis confirmed. Initiating carbidopa-levodopa therapy.',related:["MRI"]},
{term:'ALS',full:'Amyotrophic Lateral Sclerosis',cat:'neurology',def:'A progressive neurodegenerative disease affecting nerve cells controlling voluntary muscles. Also known as Lou Gehrig\'s disease.',usage:'ALS confirmed on EMG and clinical evaluation. Neurology follow-up established.',related:["EMG"]},
{term:'EEG',full:'Electroencephalogram',cat:'neurology',def:'A test measuring electrical activity in the brain using electrodes placed on the scalp. Used to diagnose seizures and epilepsy.',usage:'EEG obtained. Spike-wave discharges consistent with absence seizures.',related:["MRI"]},
{term:'COPD',full:'Chronic Obstructive Pulmonary Disease',cat:'pulmonary',def:'Progressive lung diseases mainly emphysema and chronic bronchitis causing airflow limitation. Strongly associated with smoking.',usage:'COPD exacerbation. Start prednisone, azithromycin, and nebulized albuterol.',related:["SOB","MDI","SpO2","BiPAP","ABG"]},
{term:'PNA',full:'Pneumonia',cat:'pulmonary',def:'An infection of the lung tissue causing inflammation and fluid accumulation. Can be bacterial, viral, or fungal.',usage:'CXR confirms right lower lobe PNA. Admit for IV antibiotics.',related:["SOB","WBC","CXR"]},
{term:'SpO2',full:'Peripheral Oxygen Saturation',cat:'pulmonary',def:'The percentage of hemoglobin carrying oxygen, measured with a pulse oximeter. Normal is 95-100%.',usage:'SpO2 88% on room air. Supplemental O2 started.',related:["ABG","SOB","COPD","BiPAP"]},
{term:'ABG',full:'Arterial Blood Gas',cat:'pulmonary',def:'A blood test measuring oxygen, carbon dioxide, and pH levels. Used to assess respiratory and metabolic function precisely.',usage:'ABG: pH 7.28, pCO2 58, pO2 56. Hypercapnic respiratory failure.',related:["SpO2","BiPAP","COPD"]},
{term:'CPAP',full:'Continuous Positive Airway Pressure',cat:'pulmonary',def:'A device delivering continuous pressurized air to keep airways open during sleep. Primary treatment for sleep apnea.',usage:'CPAP 10 cmH2O prescribed for moderate OSA.',related:["BiPAP","OSA","SpO2"]},
{term:'BiPAP',full:'Bilevel Positive Airway Pressure',cat:'pulmonary',def:'Non-invasive ventilation delivering two levels of air pressure. Used for COPD exacerbations and respiratory failure.',usage:'BiPAP initiated for hypercapnic respiratory failure.',related:["CPAP","ABG","COPD","DNI"]},

{term:'OOP',full:'Out of Pocket',cat:'billing',def:'The amount you pay directly for healthcare not covered by insurance, including deductibles, copays, and coinsurance.',usage:'OOP maximum $6500 met. Insurance covers 100% of remaining costs.',related:["EOB","HMO","PPO"]},
{term:'HSA',full:'Health Savings Account',cat:'billing',def:'A tax-advantaged savings account paired with a high-deductible health plan letting you set aside pre-tax money for medical expenses.',usage:'Using HSA funds for lab work and prescription copays.',related:["FSA","OOP"]},

{term:'COB',full:'Coordination of Benefits',cat:'billing',def:'The process determining which insurance plan pays first when a patient has more than one health insurance policy.',usage:'COB applied. Primary insurance paid first, secondary covered remaining balance.',related:["EOB","OOP"]},
{term:'ROM',full:'Range of Motion',cat:'orthopedics',def:'The full movement potential of a joint. Measured in degrees and used to track recovery after injury or surgery.',usage:'ROM improved from 45 to 110 degrees flexion after PT.',related:["PT","OT","ACL","TKA"]},

{term:'MCL',full:'Medial Collateral Ligament',cat:'orthopedics',def:'A ligament on the inner side of the knee that stabilizes the joint. Injuries are graded 1-3 based on severity.',usage:'Grade 2 MCL sprain. Conservative management with bracing and PT.',related:["ACL","PCL","ROM"]},
{term:'TKA',full:'Total Knee Arthroplasty',cat:'orthopedics',def:'Knee replacement surgery replacing damaged cartilage and bone with artificial components.',usage:'TKA scheduled for right knee. Pre-op clearance obtained.',related:["THA","ROM","PT"]},

{term:'OA',full:'Osteoarthritis',cat:'orthopedics',def:'A degenerative joint disease caused by breakdown of cartilage over time. Most common in knees, hips, and hands.',usage:'Bilateral knee OA on X-ray. Conservative management with NSAIDs and PT.',related:["RA","TKA","ROM","NSAID"]},

{term:'ORIF',full:'Open Reduction Internal Fixation',cat:'orthopedics',def:'Surgery to repair a broken bone by realigning fragments and securing them with hardware such as plates, screws, or rods.',usage:'ORIF performed for displaced femur Fx. Hardware well-positioned on post-op X-ray.',related:["Fx","OR"]},

{term:'HNP',full:'Herniated Nucleus Pulposus',cat:'orthopedics',def:'A slipped or herniated disc. Soft inner disc material pushes through the outer layer, potentially pressing on nearby nerves.',usage:'MRI lumbar: HNP at L4-L5 with nerve root compression.',related:["LBP","PT"]},
{term:'EMG',full:'Electromyography',cat:'orthopedics',def:'A diagnostic test measuring electrical activity of muscles and the nerves controlling them. Used to diagnose nerve and muscle disorders.',usage:'EMG/NCS ordered to evaluate peripheral neuropathy.',related:["ALS"]},

{term:'OT',full:'Occupational Therapy',cat:'orthopedics',def:'Therapy focused on helping patients regain the ability to perform daily activities after injury, illness, or disability.',usage:'OT consult placed for ADL training after CVA.',related:["PT","ROM","CVA"]},

{term:'PPI',full:'Proton Pump Inhibitor',cat:'gastro',def:'A class of medications reducing stomach acid production. Includes omeprazole, pantoprazole, and esomeprazole.',usage:'Start PPI therapy: pantoprazole 40mg PO QD before breakfast.',related:["GERD","EGD","H.pylori"]},
{term:'EGD',full:'Esophagogastroduodenoscopy',cat:'gastro',def:'Upper endoscopy. A camera procedure examining the esophagus, stomach, and first part of the small intestine.',usage:'EGD performed. Mild gastritis noted. H. pylori biopsy taken.',related:["GERD","H.pylori","GI"]},
{term:'IBD',full:'Inflammatory Bowel Disease',cat:'gastro',def:'Chronic inflammatory conditions of the digestive tract, including Crohn\'s disease and ulcerative colitis.',usage:'IBD flare confirmed. GI consult placed. Start mesalamine.',related:["UC","CD","GI","CRP"]},
{term:'UC',full:'Ulcerative Colitis',cat:'gastro',def:'A type of IBD causing chronic inflammation and ulcers in the colon and rectum. Causes bloody diarrhea and abdominal pain.',usage:'UC diagnosed on colonoscopy. Starting mesalamine therapy.',related:["IBD","CD","GI"]},
{term:'CD',full:'Crohn\'s Disease',cat:'gastro',def:'A type of IBD that can affect any part of the digestive tract. Causes inflammation, abdominal pain, diarrhea, and weight loss.',usage:'CD confirmed. Biologic therapy (adalimumab) initiated.',related:["IBD","UC","GI","CRP"]},
{term:'IBS',full:'Irritable Bowel Syndrome',cat:'gastro',def:'A functional GI disorder causing abdominal pain, bloating, and altered bowel habits without structural damage.',usage:'IBS-D diagnosed after ruling out IBD. Dietary modifications recommended.',related:["IBD","GERD","GI"]},
{term:'GI',full:'Gastrointestinal',cat:'gastro',def:'Relating to the digestive system from the mouth through the intestines and rectum.',usage:'GI consult placed for evaluation of upper GI bleed.',related:["EGD","IBD","GERD"]},
{term:'LFT',full:'Liver Function Tests',cat:'gastro',def:'Blood tests measuring liver enzymes and proteins to assess liver health and detect damage.',usage:'LFTs elevated. ALT 3x normal. Hepatology referral placed.',related:["CMP","ALT","AST"]},
{term:'ALT',full:'Alanine Aminotransferase',cat:'gastro',def:'A liver enzyme released when liver cells are damaged. Elevated ALT is a sensitive marker of liver injury.',usage:'ALT 210 U/L, significantly elevated.',related:["AST","LFT","CMP"]},
{term:'AST',full:'Aspartate Aminotransferase',cat:'gastro',def:'An enzyme found in the liver, heart, and muscles. Elevated alongside ALT suggests liver damage.',usage:'AST 180, ALT 210. Pattern consistent with hepatocellular injury.',related:["ALT","LFT","CMP"]},
{term:'ETOH',full:'Ethanol or Alcohol',cat:'gastro',def:'Medical shorthand for alcohol. Used in documentation of alcohol use history or alcohol-related conditions.',usage:'SH: ETOH use 2-3 drinks per day. LFTs elevated, likely ETOH-related.',related:["LFT","ALT","SH"]},
{term:'BRBPR',full:'Bright Red Blood Per Rectum',cat:'gastro',def:'Fresh bright red blood from the rectum, indicating bleeding in the lower GI tract such as hemorrhoids or colon lesions.',usage:'BRBPR x 2 days. Colonoscopy ordered urgently.',related:["GI","Hgb","CBC"]},
{term:'H.pylori',full:'Helicobacter Pylori',cat:'gastro',def:'A bacterial infection of the stomach lining causing ulcers and increasing stomach cancer risk. Treated with antibiotics and a PPI.',usage:'H. pylori positive on breath test. Triple therapy initiated.',related:["GERD","PPI","EGD"]},
{term:'NGT',full:'Nasogastric Tube',cat:'gastro',def:'A tube inserted through the nose into the stomach. Used for feeding, medication delivery, or stomach decompression.',usage:'NGT placed for bowel decompression. Output 800mL overnight.',related:["NPO","PO","IV"]},
{term:'CA',full:'Cancer or Carcinoma',cat:'oncology',def:'An abbreviation for cancer generally or carcinoma, a cancer arising from epithelial cells. Context determines meaning.',usage:'CA colon diagnosed stage IIIB. Oncology referral placed.',related:["Chemo","XRT","Mets","Bx"]},
{term:'Chemo',full:'Chemotherapy',cat:'oncology',def:'Treatment using chemical agents to kill or slow the growth of cancer cells. Given IV or orally in cycles.',usage:'Chemo cycle 3 of 6 completed. Next cycle in 3 weeks.',related:["XRT","CA","Mets","CBC"]},
{term:'XRT',full:'Radiation Therapy',cat:'oncology',def:'Treatment using high-energy radiation to destroy cancer cells or shrink tumors. Used alone or with chemotherapy.',usage:'XRT to right breast completed. 25 fractions total.',related:["Chemo","CA","Mets"]},
{term:'Mets',full:'Metastases',cat:'oncology',def:'The spread of cancer from the original site to other parts of the body through blood or lymph system.',usage:'CT chest and abdomen: liver Mets confirmed. Stage IV disease.',related:["CA","Chemo","XRT"]},
{term:'Bx',full:'Biopsy',cat:'oncology',def:'The removal of a small tissue sample for laboratory examination to determine if cancer or other disease is present.',usage:'Breast Bx performed. Pathology pending.',related:["CA","Dx"]},
{term:'CR',full:'Complete Remission',cat:'oncology',def:'No detectable signs of cancer after treatment. Does not mean cured, as cancer may still be present at an undetectable level.',usage:'PET scan shows CR after 6 cycles of chemotherapy.',related:["CA","Chemo","PR"]},

{term:'PTSD',full:'Post-Traumatic Stress Disorder',cat:'psych',def:'A mental health condition triggered by experiencing or witnessing a traumatic event. Causes flashbacks, nightmares, and severe anxiety.',usage:'PTSD diagnosed. Trauma-focused CBT initiated. Prazosin for nightmares.',related:["MDD","GAD","SI"]},

{term:'NICU',full:'Neonatal Intensive Care Unit',cat:'pediatrics',def:'A specialized ICU for premature or critically ill newborns requiring intensive monitoring and care.',usage:'Infant transferred to NICU for respiratory distress and prematurity at 30 weeks.',related:["ICU","OB","L&D"]},

{term:'BMI',full:'Body Mass Index',cat:'pediatrics',def:'A calculation using height and weight to estimate body fat. In children, interpreted using age- and sex-specific growth charts.',usage:'BMI 31, obese range. Nutrition counseling and activity goals discussed.',related:["Peds","DM","HTN"]},

let state={view:"home",query:"",cat:"all",term:null};

function navigate(view,arg){
  state.view=view;
  if(view==="detail"){state.term=arg;window.scrollTo(0,0);}
  if(view==="home"){state.term=null;}
  render();updateNav();
}
function updateNav(){
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("on"));
  const map={home:"nav-home",converter:"nav-converter"};
  if(map[state.view])document.getElementById(map[state.view])?.classList.add("on");
}
function search(q){
  q=q.toLowerCase().trim();
  if(!q)return DATA;
  return DATA.filter(d=>d.term.toLowerCase().includes(q)||d.full.toLowerCase().includes(q)||d.def.toLowerCase().includes(q));
}
function filterByCat(arr,cat){if(cat==="all")return arr;return arr.filter(d=>d.cat===cat);}
function catLabel(id){return CATS.find(c=>c.id===id)?.label||id;}

function renderCard(d){
  return`<div class="acard" onclick="navigate('detail','${d.term}')">
    <div class="aterm">${d.term}</div>
    <div class="afull">${d.full}</div>
    <div class="adef">${d.def}</div>
    <div class="atag">${catLabel(d.cat)}</div>
  </div>`;
}

}

function renderSidebar(){

function renderLabRange(term){
  var r=LAB_RANGES[term];
  if(!r)return "";
  var nl=(r.low===0)?"0\u20130"+r.high:r.low+"\u2013"+r.high;
  var out="";
  out+='<div class="d-sec" style="margin-top:.5rem">';
  out+='<h3>Check Your Result</h3>';
  out+='<div class="lab-range-widget">';
  out+='<div class="lrw-input-row">';
  out+='<input type="number" class="lrw-input" data-term="TERMTOKEN" placeholder="Enter your value from your lab report..." step="any" style="flex:1;height:44px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 14px;font-size:15px;font-family:inherit;outline:none;color:var(--text);background:#fff">';
  out+='<span class="lrw-unit">'+r.unit+'</span>';
  out+='</div>';
  out+='<div class="lrw-bar">';
  out+='<div class="lrw-zone-low"></div>';
  out+='<div class="lrw-zone-normal"></div>';
  out+='<div class="lrw-zone-high"></div>';
  out+='<div class="lrw-needle" id="lrw-needle-TERMTOKEN" style="display:none"></div>';
  out+='</div>';
  out+='<div class="lrw-labels">';
  out+='<span>'+r.dmin+'</span>';
  out+='<span class="lrw-label-low">Low &lt;'+r.low+'</span>';
  out+='<span class="lrw-label-normal">Normal: '+nl+'</span>';
  out+='<span class="lrw-label-high">High &gt;'+r.high+'</span>';
  out+='<span>'+r.dmax+'</span>';
  out+='</div>';
  out+='<div class="lrw-result" id="lrw-result-TERMTOKEN" style="display:none"></div>';
  out+='</div></div>';
  out=out.split("TERMTOKEN").join(term);
  return out;
}

function updateLabGauge(el,term){
  var r=LAB_RANGES[term];
  if(!r)return;
  var val=parseFloat(el.value);
  var needle=document.getElementById("lrw-needle-"+term);
  var result=document.getElementById("lrw-result-"+term);
  if(!needle||!result||isNaN(val)){
    if(needle)needle.style.display="none";
    if(result)result.style.display="none";
    return;
  }
  var pct=Math.max(0,Math.min(100,((val-r.dmin)/(r.dmax-r.dmin))*100));
  needle.style.display="block";
  needle.style.left=pct+"%";
  result.style.display="block";
  var status,color,tip,bg,icon;
  if(val<r.low){
    status="Below Normal Range";color="#DC2626";bg="#FEF2F2";tip=r.low_tip;icon="&#9660;";
  } else if(val>r.high){
    status="Above Normal Range";color="#DC2626";bg="#FEF2F2";tip=r.high_tip;icon="&#9650;";
  } else {
    status="Within Normal Range";color="#059669";bg="#F0FDF4";icon="&#10003;";
    tip="Your value falls within the standard reference range for this test. Lab reference ranges can vary slightly between laboratories and individual patient factors always matter. Discuss all results with your healthcare provider.";
  }
  needle.style.background=color;
  result.style.background=bg;
  result.style.borderColor=color+"55";
  result.innerHTML="<div class='lrw-status' style='color:"+color+"'>"+icon+" "+status+"&nbsp;&nbsp;<span style='font-size:17px;font-weight:700'>"+val+" "+r.unit+"</span></div><div class='lrw-tip'>"+tip+"</div>";
}

document.addEventListener("input",function(e){
  if(e.target.classList.contains("lrw-input")){
    updateLabGauge(e.target,e.target.getAttribute("data-term"));
  }
});


function renderDetail(){
  var d=DATA.find(function(x){return x.term===state.term;});
  if(!d){
    return '<div class="wrap"><button class="back-btn" onclick="navigate(\'home\')">&#8592; Back</button><p>Not found.</p></div>';
  }
  var relChips="";
  (d.related||[]).forEach(function(r){
    relChips+='<button class="rel-chip" onclick="navigate(\'detail\',\''+r+'\')">'+r+'</button>';
  });
  var labWidget=LAB_RANGES[d.term]?renderLabRange(d.term):"";
  var relSection="";
  if(relChips){
    relSection='<hr class="divider"><div class="d-sec"><h3>Related Abbreviations</h3><div class="rel-chips">'+relChips+'</div></div>';
  }
  var out="";
  out+='<div class="wrap"><div class="two-col"><div>';
  out+='<button class="back-btn" onclick="navigate(\'home\')">&#8592; Back to Search</button>';
  out+='<div class="detail-card">';
  out+='<div class="d-term">'+d.term+'</div>';
  out+='<div class="d-full">'+d.full+'</div>';
  out+='<div class="d-tag">'+catLabel(d.cat)+'</div>';
  out+='<div class="d-sec"><h3>Plain-English Definition</h3><p>'+d.def+'</p></div>';
  out+='<div class="d-sec"><h3>Example Usage in a Chart</h3><div class="usage-block">'+d.usage+'</div></div>';
  out+=labWidget;
  out+=relSection;
  out+='<div class="disclaimer"><span>&#9888;&#65039;</span><span><strong>Educational reference only.</strong> Medical abbreviations can have multiple meanings depending on context. Normal ranges can vary by laboratory and individual patient factors. Always confirm with your healthcare provider.</span></div>';
  out+='</div>';
  out+=adBanner();
  out+='</div>';
  out+=renderSidebar();
  out+='</div></div>';
  return out;
}


function render(){
  const app=document.getElementById("app");
  if(state.view==="home")app.innerHTML=renderHome();
  else if(state.view==="detail")app.innerHTML=renderDetail();
  else if(state.view==="converter")app.innerHTML=renderConverter();
  if(state.view==="converter"){convertWeight();convertVol();convTemp("f");calcDose();}
  if(state.view==="home"&&state.query)updateDropdown(state.query);
}
function onSearch(q){
  state.query=q;
  const results=filterByCat(search(q),state.cat);
  const count=document.querySelector(".count");
  const grid=document.querySelector(".grid");
  if(count)count.textContent=`${results.length} abbreviation${results.length!==1?"s":""} found`;
  if(grid)grid.innerHTML=results.map(renderCard).join("");
  updateDropdown(q);
}
function updateDropdown(q){
  const dd=document.getElementById("dropdown");
  if(!dd)return;
  if(!q||q.length<1){dd.classList.remove("vis");return;}
  const hits=DATA.filter(d=>d.term.toLowerCase().startsWith(q.toLowerCase())||d.full.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(!hits.length){dd.classList.remove("vis");return;}
  dd.innerHTML=hits.map(d=>`<div class="ditem" onclick="navigate('detail','${d.term}')"><span class="dt">${d.term}</span><span class="df">${d.full}</span><span class="dc">${catLabel(d.cat)}</span></div>`).join("");
  dd.classList.add("vis");
}
function handleKey(e){
  if(e.key==="Escape")document.getElementById("dropdown")?.classList.remove("vis");
  if(e.key==="Enter"){
    const q=e.target.value.trim().toUpperCase();
    const match=DATA.find(d=>d.term===q);
    if(match)navigate("detail",match.term);
    else document.getElementById("dropdown")?.classList.remove("vis");
  }
}
document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap"))document.getElementById("dropdown")?.classList.remove("vis");});
function setCat(cat){state.cat=cat;render();}
function fmt(n){return parseFloat(n.toPrecision(6)).toLocaleString();}
function convertWeight(){
  const val=parseFloat(document.getElementById("wt-val")?.value)||0;
  const from=document.getElementById("wt-from")?.value;
  let mg=val;
  if(from==="mcg")mg=val/1000;
  if(from==="g")mg=val*1000;
  const el=document.getElementById("wt-result");
  if(el)el.innerHTML=`${fmt(mg)} mg = ${fmt(mg*1000)} mcg = ${fmt(mg/1000)} g`;
}
function convertVol(){
  const val=parseFloat(document.getElementById("vol-val")?.value)||0;
  const from=document.getElementById("vol-from")?.value;
  let mL=val;
  if(from==="tsp")mL=val*4.92892;
  if(from==="tbsp")mL=val*14.7868;
  if(from==="oz")mL=val*29.5735;
  const el=document.getElementById("vol-result");
  if(el)el.innerHTML=`${fmt(mL)} mL = ${fmt(mL/4.929)} tsp = ${fmt(mL/14.787)} tbsp = ${fmt(mL/29.574)} fl oz`;
}
function convTemp(dir){
  if(dir==="f"){const f=parseFloat(document.getElementById("tf")?.value)||0;const c=(f-32)*5/9;const el=document.getElementById("tc");if(el)el.value=c.toFixed(1);}
  else{const c=parseFloat(document.getElementById("tc")?.value)||0;const f=c*9/5+32;const el=document.getElementById("tf");if(el)el.value=f.toFixed(1);}
}
function calcDose(){
  const d=parseFloat(document.getElementById("dose-per-kg")?.value)||0;
  let w=parseFloat(document.getElementById("pt-weight")?.value)||0;
  const u=document.getElementById("wt-unit")?.value;
  if(u==="lb")w=w*0.453592;
  const total=d*w;
  const el=document.getElementById("dose-result");
  if(el)el.textContent=`Total dose: ${fmt(total)} mg  (${fmt(w)} kg x ${fmt(d)} mg/kg)`;
}
render();
</script>
</body>
